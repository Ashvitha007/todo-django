<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>
    <h2>Edit Task</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="task" value="{{ todo.title }}">
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'todo' %}">Cancel</a>
</body>
</html>
