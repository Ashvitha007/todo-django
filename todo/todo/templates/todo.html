<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-body p-4">
            <h2 class="text-center mb-4">📋 Todo List</h2>
            <form method="POST">
              {% csrf_token %}
              <div class="input-group mb-3">
                <input type="text" name="task" class="form-control" placeholder="Add task..." required>
                <button type="submit" class="btn btn-primary">Add</button>
              </div>
            </form>
            <ul class="list-group">
              {% for todo in todos %}
              <li class="list-group-item d-flex justify-content-between align-items-center">
                {{ todo.title }}
                <span>
                  <a href="/edit/{{ todo.id }}/" class="btn btn-sm btn-warning">Edit</a>
                  <a href="/delete/{{ todo.id }}/" class="btn btn-sm btn-danger">Delete</a>
                </span>
              </li>
              {% empty %}
              <li class="list-group-item text-center text-muted">No tasks yet!</li>
              {% endfor %}
            </ul>
            <div class="text-center mt-3">
              <a href="/logout/" class="btn btn-secondary">Logout</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
